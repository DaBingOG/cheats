<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 金手指资料库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif;}
        body{background:#f1f1f1;padding:20px 15px;}
        
        .top-title{
            text-align:center;
            font-size:26px;
            color:#222;
            margin-bottom:16px;
            font-weight:600;
        }

        /* 搜索框样式 */
        .search-box{
            max-width:600px;
            margin:0 auto 25px auto;
            position:relative;
        }
        .search-input{
            width:100%;
            padding:12px 16px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:15px;
            outline:none;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
        }
        .search-input:focus{
            border-color:#0ea5e9;
        }
        
        .game-wrap{
            max-width:1200px;
            margin:0 auto;
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:18px;
        }

        .game-card{
            width:100%;
            aspect-ratio:1/1;
            border-radius:12px;
            overflow:hidden;
            position:relative;
            cursor:pointer;
            transition:0.3s;
            background: linear-gradient(135deg,#1e293b,#0f172a);
            background-size:cover;
            background-position:center;
        }
        .game-card:hover{transform:translateY(-5px);}

        .game-card-info{
            position:absolute;
            bottom:0;
            left:0;
            right:0;
            background:rgba(0,0,0,0.75);
            color:white;
            padding:10px 12px;
            z-index:2;
        }
        .game-card-name{
            font-size:15px;
            font-weight:bold;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .game-card-id{
            font-size:12px;
            color:#eee;
            margin-top:2px;
        }

        .pagination{
            display:flex;
            justify-content:center;
            gap:12px;
            margin:30px 0;
        }
        .page-btn{padding:10px 16px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;}
        .page-btn:disabled{opacity:0.5;}
        .page-info{line-height:36px;}

        @media (max-width:768px){
            .game-wrap{grid-template-columns:repeat(2,1fr);}
        }

        .pop-box{
            position:fixed;inset:0;
            background:rgba(0,0,0,0.6);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:999;
        }
        .pop-inner{
            width:90%;max-width:650px;
            background:#fff;
            border-radius:16px;
            padding:24px;
            max-height:85vh;
            overflow-y:auto;
            position:relative;
        }
        .close-btn-fixed{
            position:absolute;
            right:20px;top:20px;
            width:36px;height:36px;
            border-radius:50%;
            background:#f2f2f2;
            border:none;
            font-size:18px;
            cursor:pointer;
        }
        .game-title{
            font-size:22px;
            text-align:center;
            margin-bottom:10px;
        }
        .game-info-row{
            display:flex;
            justify-content:center;
            gap:24px;
            color:#666;
            margin-bottom:20px;
        }
        .cheat-container{
            max-height:400px;
            overflow-y:auto;
            margin-bottom:20px;
        }
        .cheat-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:12px 14px;
            border:1px solid #eee;
            border-radius:8px;
            margin-bottom:8px;
        }
        .cheat-label{font-weight:bold;color:#b91c1c;}
        .switch{width:44px;height:22px;background:#ccc;border-radius:99px;position:relative;}
        .switch::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.2s;}
        .switch.on{background:#16a34a;}
        .switch.on::after{left:24px;}
        .download-btn{
            width:100%;
            padding:12px;
            background:#0ea5e9;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2 class="top-title">PS5 金手指资料库</h2>

<!-- 🔍 搜索框 -->
<div class="search-box">
    <input 
        type="text" 
        class="search-input" 
        id="searchInput" 
        placeholder="搜索游戏名称 或 游戏ID（如：生化危机3 / PPSA03952）"
        oninput="searchGames()"
    >
</div>

<div id="loading" style="text-align:center;padding:30px;">加载中...</div>
<div class="game-wrap" id="gameBox"></div>

<div class="pagination">
    <button class="page-btn" id="prevBtn">上一页</button>
    <span class="page-info" id="pageInfo">第 1 页</span>
    <button class="page-btn" id="nextBtn">下一页</button>
</div>

<div class="pop-box" id="pop">
    <div class="pop-inner">
        <button class="close-btn-fixed" onclick="closePop()">×</button>
        <div class="game-title" id="gameTitle"></div>
        <div class="game-info-row">
            <span id="gameId"></span>
            <span id="gameModer"></span>
        </div>
        <div class="cheat-container" id="cheatContent"></div>
        <button class="download-btn" onclick="downloadCheat()">下载文件</button>
    </div>
</div>

<script>
// ==============================================
// ✅ 你的新 GitHub 用户名：DaBingOG
// ==============================================
const BASE_URL = "https://raw.githubusercontent.com/DaBingOG/cheats/main/shn/";
const LIST_URL = "https://raw.githubusercontent.com/DaBingOG/cheats/main/shn.txt";
const IMAGE_BASE = "https://raw.githubusercontent.com/DaBingOG/cheats/main/images/";

let GAME_LIST = [];
let FILTERED_LIST = []; // 搜索结果
let currentPage = 1;
const pageSize = 20;
let currentText = "";
let currentFileName = "";

window.onload = async function () {
    try {
        let res = await fetch(LIST_URL);
        let text = await res.text();

        GAME_LIST = text.split("\n")
            .map(line => line.trim())
            .filter(line => line && line.includes("="))
            .map(line => {
                let [file, name] = line.split("=");
                file = file.trim();
                name = name.trim();
                let id = file.replace(".shn", "");
                return { file, name, id };
            });
        
        FILTERED_LIST = [...GAME_LIST];
        document.getElementById("loading").style.display = "none";
        renderFileList();
    } catch (err) {
        document.getElementById("loading").innerText = "加载失败";
    }
};

// 🔍 搜索功能
function searchGames() {
    let keyword = document.getElementById("searchInput").value.toLowerCase().trim();
    currentPage = 1;

    if (!keyword) {
        FILTERED_LIST = [...GAME_LIST];
        renderFileList();
        return;
    }

    FILTERED_LIST = GAME_LIST.filter(item => {
        return (
            item.name.toLowerCase().includes(keyword) || 
            item.id.toLowerCase().includes(keyword)
        );
    });

    renderFileList();
}

function renderFileList() {
    const box = document.getElementById("gameBox");
    box.innerHTML = "";

    let start = (currentPage - 1) * pageSize;
    let end = start + pageSize;
    let list = FILTERED_LIST.slice(start, end);

    if (list.length === 0) {
        box.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:#666;">未找到相关游戏</div>`;
        updatePage();
        return;
    }

    list.forEach(item => {
        let card = document.createElement("div");
        card.className = "game-card";
        card.onclick = () => openFile(item);

        let imgUrl = IMAGE_BASE + item.id + ".jpg";
        card.style.backgroundImage = `url(${imgUrl})`;

        card.innerHTML = `
            <div class="game-card-info">
                <div class="game-card-name">${item.name}</div>
                <div class="game-card-id">${item.id}</div>
            </div>
        `;
        box.appendChild(card);
    });

    updatePage();
}

function updatePage() {
    let total = Math.ceil(FILTERED_LIST.length / pageSize);
    document.getElementById("pageInfo").innerText = `第 ${currentPage}/${total} 页`;
    document.getElementById("prevBtn").disabled = currentPage <= 1;
    document.getElementById("nextBtn").disabled = currentPage >= total;
}

document.getElementById("prevBtn").onclick = () => {
    if (currentPage > 1) { currentPage--; renderFileList(); }
};
document.getElementById("nextBtn").onclick = () => {
    let total = Math.ceil(FILTERED_LIST.length / pageSize);
    if (currentPage < total) { currentPage++; renderFileList(); }
};

function openFile(item) {
    currentFileName = item.file;
    document.getElementById("pop").style.display = "flex";
    document.getElementById("gameTitle").innerText = item.name;
    document.getElementById("gameId").innerText = "ID：" + item.id;
    document.getElementById("gameModer").innerText = "作者：读取中...";
    document.getElementById("cheatContent").innerText = "加载中...";

    fetch(BASE_URL + item.file)
        .then(res => res.text())
        .then(data => {
            currentText = data;
            let m = data.match(/Moder="([^"]+)"/i);
            document.getElementById("gameModer").innerText = "作者：" + (m ? m[1] : "未知");

            let cheats = [];
            let r = /Text="([^"]+)"/g;
            let t; while (t = r.exec(data)) cheats.push(t[1]);

            let html = "";
            cheats.forEach(n => {
                html += `<div class="cheat-item">
                    <div class="cheat-label">${n}</div>
                    <div class="switch"></div>
                </div>`;
            });
            document.getElementById("cheatContent").innerHTML = html;
        });
}

function closePop() {
    document.getElementById("pop").style.display = "none";
}

function downloadCheat() {
    let a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([currentText]));
    a.download = currentFileName;
    a.click();
}
</script>
</body>
</html>
