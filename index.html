<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏金手指资料库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif;}
        body{background:#f1f3f6;padding:20px 15px;}
        .top-title{text-align:center;font-size:26px;color:#222;margin-bottom:25px;font-weight:600;}
        
        .game-wrap{
            max-width:1200px;
            margin:0 auto;
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:18px;
        }

        .game-card{
            width:100%;
            aspect-ratio:1/1;
            border-radius:12px;
            overflow:hidden;
            position:relative;
            cursor:pointer;
            box-shadow:0 2px 10px #00000015;
            transition: all 0.25s ease;
        }
        .game-card:hover{
            transform: translateY(-4px);
            box-shadow:0 6px 18px rgba(0,0,0,0.2);
        }

        .game-card img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        .game-name{
            position:absolute;
            left:0;
            bottom:0;
            width:100%;
            padding:10px 0;
            text-align:center;
            font-size:14px;
            font-weight:bold;
            color:#fff;
            background: linear-gradient(transparent,rgba(0,0,0,0.7));
        }

        @media (max-width:768px){
            .game-wrap{ grid-template-columns:repeat(2, 1fr); }
        }

        .pop-box{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;z-index:999;}
        .pop-inner{width:92%;max-width:650px;background:#fff;border-radius:16px;padding:22px;max-height:85vh;overflow-y:auto;position:relative;}
        .pop-title{font-size:20px;text-align:center;margin-bottom:18px;color:#111;padding-right:40px;}
        
        .close-btn-top{
            position:absolute;
            right:20px;top:20px;
            width:32px;height:32px;
            border-radius:50%;
            background:#f1f1f1;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        .cheat-content{
            background:#fff;
            padding:14px;
            border-radius:10px;
            white-space:pre-wrap;
            font-family:Consolas;
            line-height:1.5;
        }

        .cheat-item{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#fff;
            border:1px solid #eee;
            padding:14px 16px;
            border-radius:10px;
            margin-bottom:8px;
        }
        .cheat-label{
            font-weight:bold;
            color:#d93025;
        }
        .switch{
            width:46px;
            height:24px;
            background:#ddd;
            border-radius:99px;
            position:relative;
            cursor:pointer;
        }
        .switch::after{
            content:'';
            position:absolute;
            width:20px;height:20px;
            background:#fff;
            border-radius:50%;
            top:2px;left:2px;
            transition:0.2s;
        }
        .switch.on{
            background:#22c55e;
        }
        .switch.on::after{
            left:24px;
        }

        .btn-group{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
        .btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:15px;cursor:pointer;min-width:100px;}
        .copy-btn{background:#277da1;color:#fff;}
        .down-btn{background:#43aa8b;color:#fff;}
    </style>
</head>
<body>
    <h2 class="top-title">游戏金手指资料库</h2>
    <div id="loading" style="text-align:center;">正在读取仓库金手指文件...</div>
    <div class="game-wrap" id="gameBox"></div>

    <div class="pop-box" id="pop">
        <div class="pop-inner">
            <button class="close-btn-top" onclick="closePop()">×</button>
            <h3 class="pop-title" id="popGameName"></h3>
            <div id="cheatContent"></div>
            <div class="btn-group">
                <button class="btn copy-btn" onclick="copyCheat()">复制金手指</button>
                <button class="btn down-btn" onclick="downloadCheat()">下载文件</button>
            </div>
        </div>
    </div>

<script>
// ==============================================
//  你的仓库信息（已自动配置）
// ==============================================
const OWNER = "x980506";
const REPO = "cheats";
const PATH = "shn";
const BRANCH = "main";

const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`;
const RAW_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${PATH}/`;

let currentText = "";
let gameBox = document.getElementById("gameBox");
let loading = document.getElementById("loading");

// 自动读取仓库所有 .shn 文件
fetch(API_URL)
  .then(res => res.json())
  .then(files => {
    loading.style.display = "none";
    
    let shnFiles = files.filter(f => f.name.endsWith(".shn"));

    shnFiles.forEach(file => {
      let card = document.createElement("div");
      card.className = "game-card";
      card.onclick = () => openFile(file.name);
      
      // ✅ 这里只修复图片，不改动任何读取逻辑
      card.innerHTML = `
        <img src="https://picsum.photos/seed/${file.name}/400/400">
        <div class="game-name">${file.name}</div>
      `;
      gameBox.appendChild(card);
    });
  });

// 打开金手指文件
function openFile(filename) {
  document.getElementById("popGameName").innerText = filename;
  document.getElementById("cheatContent").innerText = "加载中...";
  document.getElementById("pop").style.display = "flex";

  fetch(RAW_URL + filename)
    .then(res => res.text())
    .then(text => {
      currentText = text;

      // 提取 Text="xxx"
      let reg = /Text="([^"]+)"/g;
      let html = "";
      let match;
      while((match = reg.exec(text)) !== null){
        html += `
        <div class="cheat-item">
          <div class="cheat-label">${match[1]}</div>
          <div class="switch" onclick="this.classList.toggle('on')"></div>
        </div>
        `;
      }

      document.getElementById("cheatContent").innerHTML = html;
    });
}

function closePop() {
  document.getElementById("pop").style.display = "none";
}

function copyCheat() {
  navigator.clipboard.writeText(currentText).then(() => alert("复制成功！"));
}

function downloadCheat() {
  const blob = new Blob([currentText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = document.getElementById("popGameName").innerText;
  a.click();
}
</script>
</body>
</html>
