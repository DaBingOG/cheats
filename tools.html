    <script src="js/tools.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">

        </div>
        <div class="navbar-menu">

                <svg class="icon icon-fill" viewBox="0 0 576 512"><path d="M575.8 255.5c0 18-15 32.1-32 32.1h-32l.7 160.2c0 2.7-.2 5.4-.5 8.1V472c0 22.1-17.9 40-40 40H456c-1.1 0-2.2 0-3.3-.1c-1.4 .1-2.8 .1-4.2 .1H416 392c-22.1 0-40-17.9-40-40V448 384c0-17.7-14.3-32-32-32H256c-17.7 0-32 14.3-32 32v64 24c0 22.1-17.9 40-40 40H160 128.1c-1.5 0-3-.1-4.5-.2c-1.2 .1-2.4 .2-3.6 .2H104c-22.1 0-40-17.9-40-40V360c0-.9 0-1.9 .1-2.8V287.6H32c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 22-8s15 2 21 7L564.8 231.5c8 7 12 15 11 24z"/></svg> 首页
            </div>
            <div class="nav-item ps5-btn" id="navPopular" onclick="location.href='tutorial.html'">
                <svg class="icon ps5-icon ps5-icon-triangle" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M22.2692 6.98965C23.0395 5.65908 24.9605 5.65908 25.7309 6.98965L44.262 38.9979C45.0339 40.3313 44.0718 42 42.5311 42H5.4689C3.92823 42 2.96611 40.3313 3.73804 38.9979L22.2692 6.98965Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg> 实用教程
            </div>
            <div class="nav-item ps5-btn active" id="navTools">
                <svg class="icon ps5-icon ps5-icon-circle" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="4"/></svg> 工具箱
            </div>
            <div class="nav-item ps5-btn" id="navMessages" onclick="location.href='save.html'">
                <svg class="icon ps5-icon" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 8L40 40" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 40L40 8" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg> 游戏存档
            </div>
            <div class="nav-item nav-dropdown ps5-btn" id="navAbout" onclick="toggleAboutDropdown()">
                <svg class="icon ps5-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> 关于我们
                <div class="dropdown-menu" id="aboutDropdown">
                    <div class="dropdown-item" onclick="showAboutInfo()">信息</div>
                    <div class="dropdown-item" onclick="showDonate()">捐赠</div>
                </div>
            </div>
        </div>
        
        <!-- 移动端下拉菜单按钮 -->
        <div class="mobile-nav-wrapper">
            <button class="mobile-nav-btn" onclick="toggleMobileNav()">
                <svg class="icon" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.94971 11.9497H39.9497" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.94971 23.9497H39.9497" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.94971 35.9497H39.9497" stroke="black" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="mobile-nav-menu" id="mobileNavMenu">
                <div class="mobile-nav-item" id="mobileNavHome" onclick="location.href='index.html'; toggleMobileNav()">
                    <svg class="icon icon-fill" viewBox="0 0 576 512"><path d="M575.8 255.5c0 18-15 32.1-32 32.1h-32l.7 160.2c0 2.7-.2 5.4-.5 8.1V472c0 22.1-17.9 40-40 40H456c-1.1 0-2.2 0-3.3-.1c-1.4 .1-2.8 .1-4.2 .1H416 392c-22.1 0-40-17.9-40-40V448 384c0-17.7-14.3-32-32-32H256c-17.7 0-32 14.3-32 32v64 24c0 22.1-17.9 40-40 40H160 128.1c-1.5 0-3-.1-4.5-.2c-1.2 .1-2.4 .2-3.6 .2H104c-22.1 0-40-17.9-40-40V360c0-.9 0-1.9 .1-2.8V287.6H32c-18 0-32-14-32-32.1c0-9 3-17 10-24L266.4 8c7-7 15-8 22-8s15 2 21 7L564.8 231.5c8 7 12 15 11 24z"/></svg> 首页
                </div>
                <div class="mobile-nav-item" id="mobileNavPopular" onclick="location.href='tutorial.html'; toggleMobileNav()">
                    <svg class="icon ps5-icon ps5-icon-triangle" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M22.2692 6.98965C23.0395 5.65908 24.9605 5.65908 25.7309 6.98965L44.262 38.9979C45.0339 40.3313 44.0718 42 42.5311 42H5.4689C3.92823 42 2.96611 40.3313 3.73804 38.9979L22.2692 6.98965Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg> 实用教程
                </div>
                <div class="mobile-nav-item active" id="mobileNavTools">
                    <svg class="icon ps5-icon ps5-icon-circle" width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="4"/></svg> 工具箱
                </div>
                <div class="mobile-nav-item" id="mobileNavMessages" onclick="location.href='save.html'; toggleMobileNav()">
                    <svg class="icon ps5-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg> 游戏存档
                </div>
                <div class="mobile-nav-item" id="mobileNavAbout" onclick="toggleMobileAboutDropdown()">
                    <svg class="icon ps5-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> 关于我们
                    <div class="mobile-about-dropdown" id="mobileAboutDropdown">
                        <div class="mobile-about-item" onclick="showAboutInfo(); toggleMobileNav(); toggleMobileAboutDropdown()">信息</div>
                        <div class="mobile-about-item" onclick="showDonate(); toggleMobileNav(); toggleMobileAboutDropdown()">捐赠</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content" style="margin-top: 80px; padding-bottom: 40px;">
        <div class="tools-panel standalone">
            <div class="tools-header">
                <h2 class="tools-title">
                    <svg class="icon" width="24" height="24" viewBox="0 0 48 48" fill="none">
                        <path d="M44 16C44 22.6274 38.6274 28 32 28C29.9733 28 28.0639 27.4975 26.3896 26.6104L9 44L4 39L21.3896 21.6104C20.5025 19.9361 20 18.0267 20 16C20 9.37258 25.3726 4 32 4C34.0267 4 35.9361 4.50245 37.6104 5.38959L30 13L35 18L42.6104 10.3896C43.4975 12.0639 44 13.9733 44 16Z" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg> MC4 & JSON 金手指转换 | 自动汉化工具箱
                </h2>
            </div>
            
            <div class="tools-content">
                <div class="tools-flex-row">
                    <div class="tools-flex-col" style="flex:0 0 280px;">
                        <div class="tools-panel-box">
                            <div class="tools-subtitle">📁 选择金手指</div>
                            <div class="tools-tip-text">支持 MC4 / JSON / SHN</div>
                            
                            <div class="tools-upload-area">
                                <input type="file" id="toolsFileSelector" accept=".mc4,.json,.shn" onchange="updateToolsFileLabelWrapper()">
                                <label for="toolsFileSelector">
                                    点击或拖拽文件
                                    <div id="toolsFileLabel"></div>
                                </label>
                            </div>

                            <div style="margin-top:auto;">
                                <button class="tools-action-btn tools-btn-color-1" onclick="toolsRunDecrypt(toolsDom.fileSelector, toolsDom.resultView, toolsDom.menuPreview)">■ 解密MC4金手指</button>
                                <button class="tools-action-btn tools-btn-color-2" onclick="toolsRunConvert(toolsDom.fileSelector, toolsDom.resultView, toolsDom.menuPreview)">▲ 修复JSON金手指</button>
                                <button class="tools-action-btn tools-btn-color-5" onclick="toolsReadFileContent(toolsDom.fileSelector, toolsDom.resultView, toolsDom.menuPreview, toolsDom.loadingPanel)">✖ 读取金手指代码</button>
                            </div>
                        </div>
                    </div>

                    <div class="tools-flex-col">
                        <div class="tools-panel-box">
                            <div class="tools-subtitle">📝 金手指代码</div>
                            <textarea class="tools-result-area" id="toolsResultView" placeholder="等待转换金手指..."></textarea>
                            
                            <div id="toolsLoadingPanel">
                                <div id="toolsLoadingText">๐•ᴗ•๐ 正在翻译中，请稍候...</div>
                                <div class="tools-progress-base"><div class="tools-progress-animation"></div></div>
                            </div>

                            <div class="tools-btn-row">
                                <button class="tools-action-btn tools-btn-color-3" onclick="toolsRunTranslate(toolsDom.resultView, toolsDom.loadingPanel, toolsDom.menuPreview)">◉ 自动汉化金手指</button>
                                <button class="tools-action-btn tools-btn-color-4" onclick="toolsRunSave(toolsDom.resultView)">➤ 导出SHN格式</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tools-panel-box">
                    <div class="tools-subtitle">★ 金手指功能键可视化编辑 ★</div>
                    <div id="toolsMenuPreview" class="tools-menu-preview">
                        <div class="tools-no-preview">请先读取或生成金手指内容</div>
                    </div>
                </div>
            </div>

            <div class="tools-footer">
                By : <span>DaBing Game Studio</span> | 交流群：310630593 | 本软件完全免费，仅供学习使用 | 尊重原作，请勿篡改原作者信息
            </div>
        </div>
    </main>

    <script>
        const toolsDom = {
            fileSelector: document.getElementById("toolsFileSelector"),
            fileLabel: document.getElementById("toolsFileLabel"),
            resultView: document.getElementById("toolsResultView"),
            loadingPanel: document.getElementById("toolsLoadingPanel"),
            menuPreview: document.getElementById("toolsMenuPreview")
        };

        function updateToolsFileLabelWrapper() {
            updateToolsFileLabel(toolsDom.fileSelector, toolsDom.fileLabel);
        }

        function toggleMobileNav() {
            const mobileNavMenu = document.getElementById('mobileNavMenu');
            mobileNavMenu.classList.toggle('active');
        }

        function toggleMobileAboutDropdown() {
            const dropdown = document.getElementById('mobileAboutDropdown');
            dropdown.classList.toggle('active');
        }

        document.addEventListener("DOMContentLoaded", function() {
            toolsDom.resultView.addEventListener("input", () => toolsPreviewCheatMenu(toolsDom.resultView, toolsDom.menuPreview));
        });
    </script>
</body>
</html>
